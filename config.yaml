# Image patching parameters
patching:
  vis_scale: 0.007
  patch_size_dict: 
    PB: 528
    HM: 280
    BJ: 487
  perc_wpx: 0.7
  perc_bpx: 0.05
  enlarge: 5

# Visualization parameters
visualization:
  color_map: "CMRmap_r"

  colors:
    pej: [220, 20, 60]           # crimson
    non_pej: [255, 215, 0]       # gold
    healthy: [50, 205, 50]       # lime green

# Model parameters
model:
  batch_size: 32
  path_triple_resnets: "models"

paths:
  pth_to_patches: "data/patches/"
  pth_to_features: "data/features"
  pth_to_coords: "checkpoints/coords_checkpoints"
  pth_to_models: "data/models"
  pth_to_tab: "data/tabs"
  pth_to_tumor_ckpts: "checkpoints/tumor_checkpoints"
  pth_to_inflams_dats: "checkpoints/inflam_dats"
  pth_to_inflams_ckpts: "checkpoints/inflam_checkpoints"
  pth_to_nuc_ckpts: "checkpoints/nucleus_checkpoints"
  pth_to_nuc_dats: "checkpoints/nucleus_dats"
  results_path: "results"
  overview_path: "results/overview_wsis"
  pth_to_preds_wsis: "results/overview_preds_tumor_wsis"
  pth_to_inflams_wsis: "results/overview_preds_inflam_wsis"
  pth_to_maps: "results/overview_maps"
  
# stain separation
staining:
  hemato_1: [73, 119, 185.0] #H_1
  eosin: [245, 143.0, 204] # E
  safran: [248.0, 245, 152] #S
  hemato_2: [123, 153, 198] #H_2
  lambda: 1.15e-1
  poids: [1.5, 1]

# nuclear features
nuc_features: ["density", "mean nucleus area","anisocaryose","nucleocyto index" ]